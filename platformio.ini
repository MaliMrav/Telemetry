; Telemetry - Embedded telemetry framework for ESP microcontrollers
; PlatformIO Project Configuration File

[platformio]
extra_configs = platformio.local.ini

[env:ESP8266]
platform = espressif8266
board = esp12e
framework = arduino

build_flags =
    -I lib

monitor_speed = 115200

; OTA support
upload_protocol = espota
upload_speed = 230400
upload_port = weather-display.local

lib_deps =
    knolleary/PubSubClient
    https://github.com/ThingPulse/minigrafx.git
    tzapu/WiFiManager
    paulstoffregen/XPT2046_Touchscreen