; PlatformIO Project Configuration File

[platformio]
extra_configs = platformio.local.ini

[env:ESP8266]
platform = espressif8266
board = esp12e
framework = arduino

build_flags =
    -I lib

monitor_speed = 115200

; OTA support
upload_protocol = espota
upload_speed = 230400
upload_port = weather-display.local

; Optional:
; To enable OTA authentication create a
; platformio.local.ini file (see README)
; and add:
;
; upload_flags =
;     --auth=your-password

lib_deps =
    plapointe6/EspMQTTClient
    https://github.com/ThingPulse/minigrafx.git
    tzapu/WiFiManager
    paulstoffregen/XPT2046_Touchscreen